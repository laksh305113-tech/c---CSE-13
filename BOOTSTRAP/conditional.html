<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let day=3;
        switch(day){
            case 1:
                document.write("today is monday");
                break;
                case 2:
                    document.write("tomorrow is tuesday");
                    break;
                case 3:
                    document.write("day after tomorrow is wednesday");
                    break;
                default:
                    document.write("invalid day");
                    break;        
                    
        }
    </script>
</body>
</html>
